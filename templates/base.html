<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}中医典籍{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="site-header no-print">
    <nav class="site-nav">
      <a href="{{ url_for('index') }}" class="site-title">中医典籍</a>
      <a href="{{ url_for('neijing_index') }}">黄帝内经</a>
      <a href="{{ url_for('bencao_index') }}">神农本草经</a>
    </nav>
    <form method="get" action="{{ url_for('search') }}" class="search-box">
      <input type="text" name="q" placeholder="搜索原文…" value="{{ request.args.get('q', '') }}">
      <button type="submit">搜索</button>
    </form>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
