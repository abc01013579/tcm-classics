{% extends "base.html" %}
{% block title %}{{ sutra.title_zh }} - 中华典籍{% endblock %}
{% block content %}
  <article class="reading">
    <button type="button" class="print-btn no-print" onclick="window.print()">打印本经</button>
    <h1>{{ sutra.title_zh }} <span class="zhouyi-en-hint">{{ sutra.title_en }}</span></h1>

    {% for para in sutra.paragraphs %}
      <div class="bilingual-pair">
        <p class="bilingual-zh">{{ para.zh }}</p>
        <p class="bilingual-en">{{ para.en }}</p>
      </div>
    {% endfor %}
  </article>
{% endblock %}
