{% extends "base.html" %}
{% block title %}神农本草经{% endblock %}
{% block content %}
  <h1>神农本草经</h1>

  <div class="text-cards">
    {% for juan in juan_list %}
      <a class="text-card" href="{{ url_for('bencao_juan', juan_slug=juan.slug) }}">
        <h2>{{ juan.name }}</h2>
        <p>{{ juan.entries|length }} 条</p>
      </a>
    {% endfor %}
  </div>
{% endblock %}
