{% extends "base.html" %}
{% block title %}奇经八脉考{% endblock %}
{% block content %}
  <h1>奇经八脉考</h1>

  {% for chapter in chapters %}
    <section class="toc-section">
      <h2>{{ chapter.title }}</h2>
      <ol class="toc-grid">
        {% for entry in chapter.entries %}
          <li>
            <a href="{{ url_for('qijingbamai_entry', number=entry.number) }}">
              第 {{ entry.local_number }} 条
            </a>
          </li>
        {% endfor %}
      </ol>
    </section>
  {% endfor %}
{% endblock %}
