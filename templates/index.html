{% extends "base.html" %}
{% block title %}中华典籍{% endblock %}
{% block content %}
  <h1>中华典籍</h1>
  <p class="hint">阅读并搜索中华经典原文，记录日常随笔。</p>

  <div class="text-cards">
    <a class="text-card" href="{{ url_for('neijing_index') }}">
      <h2>黄帝内经</h2>
      <p>《素问》八十一篇 · 《灵枢经》八十一篇</p>
    </a>
    <a class="text-card" href="{{ url_for('bencao_index') }}">
      <h2>神农本草经</h2>
      <p>上卷 · 中卷 · 下卷</p>
    </a>
    <a class="text-card" href="{{ url_for('zhouyi_index') }}">
      <span class="hexagram-mini text-card-icon">
        {% for bit in zhouyi_icon.bits_bottom_up|reverse %}
          <div class="line {{ 'yang' if bit == 1 else 'yin' }}"></div>
        {% endfor %}
      </span>
      <h2>周易</h2>
      <p>六十四卦 · 中英对照</p>
    </a>
    <a class="text-card" href="{{ url_for('xinjing') }}">
      <h2>心经</h2>
      <p>般若波罗蜜多心经 · 中英对照</p>
    </a>
    <a class="text-card" href="{{ url_for('journal_index') }}">
      <h2>随笔</h2>
      <p>日常感悟与随想</p>
    </a>
  </div>
{% endblock %}
